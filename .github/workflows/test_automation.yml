name: Test Automation

on:
  push:
    branches:
      - main
      - feature/**
      - cursor/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: etf_test
          POSTGRES_USER: etf_user
          POSTGRES_PASSWORD: etf_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etf_user -d etf_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://etf_user:etf_pass@localhost:5432/etf_test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run automation health checks
      run: |
        PYTHONPATH=. python analytics/test_enhanced_workflow.py
