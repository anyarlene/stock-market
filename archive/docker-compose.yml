services:
  postgres:
    image: postgres:16
    container_name: etf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-etf_db}
      POSTGRES_USER: ${DB_USER:-etf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-etf_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-etf_user} -d ${DB_NAME:-etf_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: etf_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      MB_LOAD_SAMPLE_CONTENT: "false"
      MB_INSTALL_ANALYTICS_DATABASE: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  metabase_data:
